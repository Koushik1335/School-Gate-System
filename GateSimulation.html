<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Gate System - Live Simulation</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='GateSystemInterface.css') }}">
</head>
<body class="sim-body">
<div class="sim-page">

    <div class="sim-topbar">
        <div class="sim-title-row">
            <button id="startStopBtn" class="stopped" onclick="toggleRun()">START</button>
            <h1 class="sim-title">SCHOOL GATE SYSTEM</h1>
            <div class="sim-clock">
                <span>DAY: <span id="dayLabel"></span></span>
                <span>TIME: <span id="timeLabel"></span></span>
            </div>
        </div>
    </div>

    <div class="sim-map-wrap">
        <svg id="simSvg" viewBox="0 0 1067 693" xmlns="http://www.w3.org/2000/svg">

            <rect class="ground" x="49" y="121" width="993" height="467"></rect>

            <rect class="zone-block" x="87" y="144" width="247" height="383"></rect>
            <rect class="zone-block" x="387" y="423" width="655" height="104"></rect>
            <line class="fence-line" style="stroke-width:3" x1="335" y1="527" x2="386" y2="527"></line>

            <rect class="building" x="387" y="198" width="134" height="134"></rect>
            <line class="building-line" x1="454" y1="198" x2="454" y2="332"></line>
            <line class="building-line" x1="387" y1="265" x2="521" y2="265"></line>

            <rect class="building" x="566" y="198" width="133" height="134"></rect>
            <line class="building-line" x1="632" y1="198" x2="632" y2="332"></line>
            <line class="building-line" x1="566" y1="265" x2="699" y2="265"></line>

            <rect class="oval" x="760" y="120" width="282" height="291"></rect>
            <rect class="fence-line" x="46" y="117" width="999" height="471"></rect>

            <rect class="hedge-base" x="337" y="130" width="14" height="4"></rect>
            <rect class="hedge-bush" x="338" y="117" width="12" height="15" rx="3"></rect>

            <rect class="hedge-base" x="441" y="136" width="232" height="6"></rect>
            <g id="hedgeBushes"></g>
            <g id="peopleLayer"></g>
        </svg>
    </div>

    <div class="sim-legend">
        <div class="legend-grid">
            <div class="legend-item"><span class="legend-swatch" style="background:#000;"></span> - Closed Gate</div>
            <div class="legend-item"><span class="legend-swatch" style="background:#4e4e4e;"></span> - Senior-only Gate</div>
            <div class="legend-item"><span class="legend-swatch" style="background:#fff;border:1px solid #000;"></span> - Open Gate</div>
            <div class="legend-item"><span class="legend-fence-line"></span> - Fence</div>
        </div>
        <div class="legend-person-row" id="personLegendRow">
            <span class="legend-dot"></span> - Person
        </div>
    </div>

    <div class="sim-controls">
        <div class="speed-group">
            <label for="speedSlider">Speed</label>
            <input type="range" id="speedSlider" min="1" max="60" value="15">
            <span id="speedLabel">15 sim-min / sec</span>
        </div>

        <div>
            <label for="daySelect">Day</label>
            <select id="daySelect" class="day-select" onchange="setDay(this.value)">
                <option value="0">Monday</option>
                <option value="1">Tuesday</option>
                <option value="2">Wednesday</option>
                <option value="3">Thursday</option>
                <option value="4">Friday</option>
            </select>
        </div>

        <div class="jump-group">
            <span style="align-self:center;">Jump to:</span>
            <button class="jump-btn" onclick="jumpTo(450)">7:30</button>
            <button class="jump-btn" onclick="jumpTo(525)">8:45</button>
            <button class="jump-btn" onclick="jumpTo(600)">10:00</button>
            <button class="jump-btn" onclick="jumpTo(630)">10:30</button>
            <button class="jump-btn" onclick="jumpTo(705)">11:45</button>
            <button class="jump-btn" onclick="jumpTo(735)">12:15</button>
            <button class="jump-btn" onclick="jumpTo(810)">13:30</button>
            <button class="jump-btn" onclick="jumpTo(830)">13:50</button>
            <button class="jump-btn" onclick="jumpTo(905)">15:05</button>
            <button class="jump-btn" onclick="jumpTo(960)">16:00</button>
        </div>

        <button class="jump-btn" style="background:#555;" onclick="resetSim()">Reset</button>
    </div>
</div>

<script src="{{ url_for('static', filename='GateSystem.js') }}"></script>

</body>
</html>
